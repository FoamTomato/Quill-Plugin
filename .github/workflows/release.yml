name: Auto-release on push to main

# Strategy
# --------
# Every push to main:
#   1. Read the latest git tag → compute next version by bumping patch
#      (e.g. v0.2.0 → v0.2.3). The very first run with no prior tag
#      starts at v0.2.0 (matches plugin.json).
#   2. Run git-cliff to generate Markdown release notes from commits
#      since the previous tag (relies on Conventional Commit prefixes:
#      feat/fix/perf/docs/refactor/test/style/chore/ci).
#   3. Pack the plugin source into quill-plugin-<version>.tar.gz —
#      tar contents nested under a single quill-plugin/ directory so
#      `tar -xzf` leaves a clean dir.
#   4. Push the new tag, create a GitHub Release, attach the tarball
#      + SHA256SUMS.
#
# Skip rules
# ----------
# - commits whose subject line contains `[skip release]` or `[skip ci]`
#   are ignored (use this for CI/docs-only commits you don't want to
#   trigger a version bump for).
# - the workflow itself creates a tag — the resulting `push` event for
#   that tag does NOT re-trigger this workflow because we only listen
#   to branch pushes (`branches: [main]`), not tag pushes.
#
# Manual major/minor bumps
# ------------------------
# This workflow auto-bumps patch only. To bump minor/major, push a
# commit with `[bump minor]` or `[bump major]` in the subject — the
# `compute-version` step honors that hint over the auto-patch default.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump kind"
        required: false
        default: "patch"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write   # tag push + release creation

concurrency:
  # If two pushes land within seconds, run sequentially so version
  # numbering can't race. Cancel-in-progress=false means the second
  # push still gets its own release after the first finishes.
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history + tags for git-cliff and `git describe`

      - name: Skip if commit says so
        id: skip-check
        run: |
          MSG="$(git log -1 --pretty=%B)"
          if echo "$MSG" | grep -qE '\[skip release\]|\[skip ci\]'; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "::notice::Commit message contains [skip release] / [skip ci] — exiting cleanly."
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.skip-check.outputs.skip != '1'
        id: version
        run: |
          set -euo pipefail
          LATEST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)"
          if [ -z "$LATEST_TAG" ]; then
            # First-ever release — anchor to plugin.json's declared version (0.2.0)
            BASE_VERSION="$(jq -r '.version' plugin.json)"
            CUR_TAG="v${BASE_VERSION}"
            echo "No prior tag — bootstrapping at $CUR_TAG"
            # Treat as if v0.2.0 was implicitly tagged so we bump patch from there.
            MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
            MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
            PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
          else
            CUR_TAG="$LATEST_TAG"
            VER="${CUR_TAG#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
          fi

          # Determine bump kind
          MSG="$(git log -1 --pretty=%B)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
          elif echo "$MSG" | grep -q '\[bump major\]'; then
            BUMP="major"
          elif echo "$MSG" | grep -q '\[bump minor\]'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "prev_tag=$CUR_TAG" >> "$GITHUB_OUTPUT"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "::notice::$CUR_TAG → $NEXT_TAG ($BUMP)"

      - name: Install git-cliff (binary release)
        if: steps.skip-check.outputs.skip != '1'
        # The orhun/git-cliff-action@v3 docker action sometimes fails at
        # `apt-get install jq` in the container build (network/timeout flake).
        # Downloading the pre-built binary from GitHub Releases is faster
        # and avoids the Docker build entirely.
        run: |
          set -euo pipefail
          VERSION="2.6.1"   # pin so a bad upstream release can't break us silently
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${VERSION}/git-cliff-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            -o /tmp/git-cliff.tar.gz
          mkdir -p /tmp/git-cliff
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp/git-cliff --strip-components=1
          sudo install -m 755 /tmp/git-cliff/git-cliff /usr/local/bin/git-cliff
          git-cliff --version

      - name: Generate changelog with git-cliff
        if: steps.skip-check.outputs.skip != '1'
        id: changelog
        # --tag tells git-cliff the upcoming version label; it ranges from
        # the prev tag up to HEAD and labels the section as that tag.
        run: |
          git-cliff --verbose \
            --config cliff.toml \
            --tag "${{ steps.version.outputs.next_tag }}" \
            --unreleased \
            --strip header \
            --output CHANGES.md
          echo "--- CHANGES.md ---"
          cat CHANGES.md

      - name: Sync plugin.json version field
        if: steps.skip-check.outputs.skip != '1'
        run: |
          # Update plugin.json so the version we ship in the tarball matches the tag.
          # We do NOT commit this back to main — the tag is the source of truth.
          # This only modifies the working tree for the tar pack step below.
          jq --arg v "${{ steps.version.outputs.next_version }}" '.version = $v' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json
          echo "plugin.json now declares version ${{ steps.version.outputs.next_version }}"

      - name: Pack tarball
        if: steps.skip-check.outputs.skip != '1'
        id: pack
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.next_version }}"
          NAME="quill-plugin-${VERSION}"

          # Stage the plugin into a clean directory so the tar has a predictable
          # top-level dir name (quill-plugin/), independent of GitHub's checkout path.
          mkdir -p /tmp/pack
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='cliff.toml' \
            --exclude='CHANGES.md' \
            --exclude='node_modules' \
            --exclude='*.swp' \
            --exclude='.DS_Store' \
            ./ /tmp/pack/quill-plugin/

          mkdir -p dist
          tar -czf "dist/${NAME}.tar.gz" -C /tmp/pack quill-plugin

          # SHA256 for integrity check / pinning in client install scripts
          (cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          (cd dist && shasum -a 256 "${NAME}.tar.gz" > SHA256SUMS)

          ls -la dist/
          echo "tarball=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.skip-check.outputs.skip != '1'
        # Tagging the SHA of the push (not the tree we mutated by syncing
        # plugin.json) so the tag points at the real commit on main.
        # The published tarball still has the synced version inside —
        # that's intentional, because the in-repo plugin.json on main
        # lags one version behind the tag (we don't auto-commit it back).
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.next_tag }}" \
            -m "Release ${{ steps.version.outputs.next_tag }}" \
            "${{ github.sha }}"
          git push origin "${{ steps.version.outputs.next_tag }}"

      - name: Create GitHub Release
        if: steps.skip-check.outputs.skip != '1'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: ${{ steps.version.outputs.next_tag }}
          body_path: CHANGES.md
          files: |
            dist/${{ steps.pack.outputs.name }}.tar.gz
            dist/${{ steps.pack.outputs.name }}.tar.gz.sha256
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          # Pre-release flag toggle (release-only after first stable)
          prerelease: false
          make_latest: true

      - name: Summary
        if: steps.skip-check.outputs.skip != '1'
        run: |
          {
            echo "## Released ${{ steps.version.outputs.next_tag }}"
            echo ""
            echo "**Bump**: ${{ steps.version.outputs.bump }}"
            echo "**Previous**: ${{ steps.version.outputs.prev_tag }}"
            echo ""
            echo "**Install**:"
            echo '```bash'
            echo "curl -fsSL https://github.com/FoamTomato/Quill-Plugin/releases/download/${{ steps.version.outputs.next_tag }}/${{ steps.pack.outputs.name }}.tar.gz -o /tmp/quill-plugin.tar.gz"
            echo "tar -xzf /tmp/quill-plugin.tar.gz -C ~/.claude/plugins/"
            echo "# or: claude plugin install <extracted-path>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
